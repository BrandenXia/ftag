name: Build

on:
  push:
    tags:
      - v*

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            cc: gcc

          # Linux ARM64 (cross-compile)
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc

          # macOS Intel
          - os: macos
            arch: amd64
            runner: macos-13
            cc: clang

          # macOS ARM (Apple Silicon)
          - os: macos
            arch: arm64
            runner: macos-latest
            cc: clang

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install make || true

      - name: Build
        run: |
          make clean || true
          make MODE=RELEASE CC=${{ matrix.cc }}

      - name: Rename binary
        run: |
          mv build/ftag ftag-${{ steps.version.outputs.VERSION }}-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ftag-${{ steps.version.outputs.VERSION }}-${{ matrix.os }}-${{ matrix.arch }}
          path: ftag-${{ steps.version.outputs.VERSION }}-${{ matrix.os }}-${{ matrix.arch }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.build.outputs.version }}
          release_name: Release ${{ needs.build.outputs.version }}
          draft: false
          prerelease: false

      - name: Upload release assets
        run: |
          for file in artifacts/**/*.tar.gz; do
            echo "Uploading $file"
            gh release upload "${{ needs.build.outputs.version }}" "$file" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
