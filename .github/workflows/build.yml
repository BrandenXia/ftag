name: Build

on:
  push:
    tags:
      - v*

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            cc: gcc

          - os: macos
            arch: amd64
            runner: macos-15-intel
            cc: clang

          - os: macos
            arch: arm64
            runner: macos-latest
            cc: clang

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install make || true

      - name: Build
        run: |
          make clean || true
          make MODE=RELEASE CC=${{ matrix.cc }} VERSION=v${{ steps.version.outputs.VERSION }}

      - name: Package binary
        run: |
          NAME=ftag-${{ steps.version.outputs.VERSION }}-${{ matrix.os }}-${{ matrix.arch }}
          mv build/ftag $NAME
          tar -czf $NAME.tar.gz $NAME

      - name: Generate checksum
        run: |
          sha256sum *.tar.gz > checksums-${{ matrix.os }}-${{ matrix.arch }}.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            *.tar.gz
            checksums-*.txt

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Merge checksums
        run: |
          cat dist/**/checksums-*.txt > dist/checksums.txt

      - name: Create Release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          files: |
            dist/**/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
